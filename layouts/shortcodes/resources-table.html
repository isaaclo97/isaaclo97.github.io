    </thead>
    <tbody id="res-tbody"></tbody>
  </table>

<nav id="res-pagination" aria-label="Paginación" style="margin-top:1rem;"></nav>

<script>
(function () {
  const PER_PAGE = 15;
  let filtered = RESOURCES.slice();
  let currentPage = 1;

  const tbody   = document.getElementById('res-tbody');
  const paginav = document.getElementById('res-pagination');
  const counter = document.getElementById('res-count');
  const input   = document.getElementById('res-search');

  function render() {
    const total = filtered.length;
    const pages = Math.max(1, Math.ceil(total / PER_PAGE));
    currentPage = Math.min(currentPage, pages);
    const start = (currentPage - 1) * PER_PAGE;
    const slice = filtered.slice(start, start + PER_PAGE);

    tbody.innerHTML = slice.map(r =>
      `<tr><td>${r.id}</td><td><a href="${r.url}">Ver código</a></td></tr>`
    ).join('');

    counter.textContent = `${total} recurso${total !== 1 ? 's' : ''}`;

    if (pages <= 1) { paginav.innerHTML = ''; return; }

    let btns = '';
    const prevDis = currentPage === 1 ? 'disabled' : '';
    const nextDis = currentPage === pages ? 'disabled' : '';
    btns += `<button class="btn btn-sm btn-outline-primary" ${prevDis} onclick="resPage(${currentPage-1})">‹ Anterior</button> `;

    const w = 2, lo = Math.max(1, currentPage - w), hi = Math.min(pages, currentPage + w);
    if (lo > 1) btns += `<button class="btn btn-sm btn-outline-secondary" onclick="resPage(1)">1</button> `;
    if (lo > 2) btns += `<span style="padding:0 .3rem">…</span>`;
    for (let i = lo; i <= hi; i++) {
      const active = i === currentPage ? 'btn-primary' : 'btn-outline-primary';
      btns += `<button class="btn btn-sm ${active}" onclick="resPage(${i})">${i}</button> `;
    }
    if (hi < pages - 1) btns += `<span style="padding:0 .3rem">…</span>`;
    if (hi < pages) btns += `<button class="btn btn-sm btn-outline-secondary" onclick="resPage(${pages})">${pages}</button> `;
    btns += `<button class="btn btn-sm btn-outline-primary" ${nextDis} onclick="resPage(${currentPage+1})">Siguiente ›</button>`;

    paginav.innerHTML = `<div style="display:flex;gap:.25rem;flex-wrap:wrap;align-items:center;">${btns}</div>`;
  }

  window.resPage = function(p) { currentPage = p; render(); };

  input.addEventListener('input', function () {
    const q = this.value.trim().toLowerCase();
    filtered = q ? RESOURCES.filter(r => r.id.toLowerCase().includes(q)) : RESOURCES.slice();
    currentPage = 1;
    render();
  });

  render();
})();
</script>
